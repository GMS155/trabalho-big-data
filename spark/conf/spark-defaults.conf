# Spark defaults – applied to both master/worker and the API driver.

spark.master                            spark://spark-master:7077
spark.hadoop.fs.defaultFS               hdfs://namenode:9000
spark.hadoop.dfs.replication            1

# Allow the API container (driver) to be reached by executors
spark.driver.host                       api

# Streaming checkpoint on HDFS
spark.sql.streaming.checkpointLocation  hdfs://namenode:9000/checkpoint/streaming

# Reduce excessive logging
spark.sql.shuffle.partitions            8
